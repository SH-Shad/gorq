<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Groq AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070d;
    --surface: #0f0f18;
    --surface2: #171724;
    --border: #1e1e30;
    --border2: #2a2a40;
    --accent: #4fffb0;
    --accent-dim: rgba(79,255,176,0.1);
    --accent-glow: rgba(79,255,176,0.22);
    --purple: #9d7bff;
    --text: #eeeef5;
    --muted: #55556e;
    --muted2: #88889a;
    --user-bg: #13131f;
    --bot-bg: #0d0d18;
    --error: #ff5577;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content:'';
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(79,255,176,0.06) 0%, transparent 60%),
      linear-gradient(rgba(79,255,176,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,255,176,0.022) 1px, transparent 1px);
    background-size: auto, 48px 48px, 48px 48px;
  }

  /* HEADER */
  header {
    position:relative; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; height:56px;
    border-bottom:1px solid var(--border);
    background:rgba(7,7,13,0.94);
    backdrop-filter:blur(16px);
    flex-shrink:0;
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-mark {
    width:32px; height:32px; border-radius:9px;
    background:linear-gradient(135deg,var(--accent),#00c4ff);
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
    box-shadow:0 0 18px rgba(79,255,176,0.3);
    flex-shrink:0;
  }
  .logo-name {
    font-family:'Syne',sans-serif;
    font-weight:800; font-size:17px; letter-spacing:-0.3px;
  }
  .logo-name em { color:var(--accent); font-style:normal; }

  .header-right { display:flex; align-items:center; gap:10px; }

  .pill {
    font-size:10px; padding:3px 10px;
    border:1px solid var(--border2); color:var(--muted2);
    border-radius:20px; letter-spacing:0.4px; white-space:nowrap;
  }
  .pill.on { border-color:var(--accent); color:var(--accent); }

  .live-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--accent); box-shadow:0 0 8px var(--accent);
    animation:blink 2.2s ease-in-out infinite; flex-shrink:0;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.28} }

  .icon-btn {
    background:none; border:1px solid var(--border2);
    color:var(--muted2); width:30px; height:30px;
    border-radius:8px; cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; flex-shrink:0;
  }
  .icon-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

  /* CHAT SCREEN */
  #chat-screen {
    display:none; flex-direction:column;
    flex:1; overflow:hidden; position:relative; z-index:1;
  }

  #messages {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:28px 16px 12px;
    display:flex; flex-direction:column; gap:4px;
    scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar { width:3px; }
  #messages::-webkit-scrollbar-track { background:transparent; }
  #messages::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  /* WELCOME */
  .welcome {
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:28px 16px 20px;
    flex:1; min-height:0;
    animation:fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(14px)}
    to{opacity:1;transform:translateY(0)}
  }
  .welcome-glyph {
    width:68px; height:68px; border-radius:18px;
    background:linear-gradient(135deg,rgba(79,255,176,0.13),rgba(0,196,255,0.08));
    border:1px solid rgba(79,255,176,0.18);
    display:flex; align-items:center; justify-content:center;
    font-size:30px; margin-bottom:18px;
    box-shadow:0 0 40px rgba(79,255,176,0.08);
    animation:float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}
  }
  .welcome h2 {
    font-family:'Syne',sans-serif;
    font-size:clamp(19px,5vw,25px);
    font-weight:800; letter-spacing:-0.4px; margin-bottom:8px;
    background:linear-gradient(100deg,var(--text) 30%,var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .welcome p {
    color:var(--muted2); font-size:12px;
    max-width:270px; line-height:1.75; margin-bottom:22px;
  }
  .chips {
    display:flex; flex-wrap:wrap; gap:7px;
    justify-content:center; max-width:480px;
  }
  .chip {
    background:var(--surface2); border:1px solid var(--border2);
    color:var(--muted2); font-family:'JetBrains Mono',monospace;
    font-size:11px; padding:7px 13px; border-radius:20px;
    cursor:pointer; transition:all 0.2s; line-height:1;
  }
  .chip:hover {
    border-color:var(--accent); color:var(--accent);
    background:var(--accent-dim); transform:translateY(-1px);
  }

  /* MESSAGE ROWS */
  .msg-row {
    display:flex; gap:9px;
    width:100%; max-width:760px;
    opacity:0; animation:slideUp 0.22s ease forwards;
  }
  @keyframes slideUp {
    from{opacity:0;transform:translateY(5px)}
    to{opacity:1;transform:translateY(0)}
  }
  .msg-row.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg-row.bot  { align-self:flex-start; }

  @media(min-width:640px) {
    #messages { padding:28px 28px 12px; align-items:center; }
    .msg-row  { max-width:min(660px,90%); }
    .welcome  { max-width:560px; align-self:center; }
  }

  .av {
    width:27px; height:27px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; flex-shrink:0; margin-top:5px;
  }
  .msg-row.user .av { background:linear-gradient(135deg,var(--purple),#c77dff); }
  .msg-row.bot  .av {
    background:linear-gradient(135deg,var(--accent),#00c4ff);
    box-shadow:0 0 10px rgba(79,255,176,0.2);
  }

  .bubble {
    padding:10px 14px; border-radius:13px;
    font-size:13.5px; line-height:1.72;
    max-width:calc(100% - 38px); word-break:break-word;
  }
  .msg-row.user .bubble {
    background:var(--user-bg);
    border:1px solid var(--border2);
    border-top-right-radius:3px;
  }
  .msg-row.bot .bubble {
    background:var(--bot-bg);
    border:1px solid var(--border);
    border-top-left-radius:3px;
  }
  .bubble strong { color:var(--accent); font-weight:600; }
  .bubble code {
    background:rgba(79,255,176,0.1); color:var(--accent);
    padding:1px 6px; border-radius:5px; font-size:12px;
  }
  .bubble pre {
    background:#050510; border:1px solid var(--border2);
    border-radius:10px; padding:13px; margin:10px 0;
    overflow-x:auto; font-size:12px; line-height:1.6;
  }
  .bubble pre code { background:none; padding:0; color:#a8ffda; }

  /* TYPING */
  .typing-dots { display:flex; gap:5px; padding:3px 2px; align-items:center; }
  .typing-dots span {
    width:5px; height:5px; background:var(--accent);
    border-radius:50%; animation:tdot 1.1s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:.18s}
  .typing-dots span:nth-child(3){animation-delay:.36s}
  @keyframes tdot {
    0%,60%,100%{transform:translateY(0);opacity:.35}
    30%{transform:translateY(-5px);opacity:1}
  }

  /* INPUT AREA */
  .input-area {
    padding:10px 16px 14px;
    border-top:1px solid var(--border);
    background:rgba(7,7,13,0.94);
    backdrop-filter:blur(16px);
    flex-shrink:0;
  }
  @media(min-width:640px) {
    .input-area { padding:10px 28px 16px; }
    .input-inner { max-width:720px; margin:0 auto; }
  }
  .input-box {
    display:flex; align-items:flex-end; gap:8px;
    background:var(--surface); border:1px solid var(--border2);
    border-radius:13px; padding:8px 9px 8px 15px;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .input-box:focus-within {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-dim);
  }
  #user-input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:'JetBrains Mono',monospace;
    font-size:13.5px; line-height:1.55; resize:none;
    max-height:130px; min-height:22px; padding:4px 0;
  }
  #user-input::placeholder { color:var(--muted); }

  .input-btns { display:flex; gap:6px; align-items:center; }

  .btn-clear {
    background:none; border:1px solid var(--border2);
    color:var(--muted); width:32px; height:32px;
    border-radius:8px; cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; flex-shrink:0;
  }
  .btn-clear:hover { border-color:var(--error); color:var(--error); }

  .btn-send {
    background:var(--accent); border:none; color:#000;
    width:32px; height:32px; border-radius:8px;
    cursor:pointer; font-size:14px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; flex-shrink:0;
  }
  .btn-send:hover:not(:disabled) { background:#6fffbf; transform:scale(1.07); }
  .btn-send:disabled { opacity:.3; cursor:not-allowed; transform:none; }

  .input-hint {
    font-size:10px; color:var(--muted);
    margin-top:6px; padding-left:3px; letter-spacing:0.2px;
  }

  /* MOBILE */
  @media(max-width:420px) {
    header { padding:0 12px; }
    .logo-name { font-size:15px; }
    .pill { display:none; }
    #messages { padding:14px 10px 8px; }
    .bubble { font-size:13px; padding:9px 12px; }
    .input-area { padding:8px 10px 12px; }
    #user-input { font-size:13px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">⚡</div>
    <div class="logo-name">Groq <em>AI</em></div>
  </div>
  <div class="header-right">
    <span class="pill on" id="model-label">llama-3.1-8b</span>
    <div class="live-dot"></div>
    <button class="icon-btn" onclick="resetChat()" title="New chat">✦</button>
  </div>
</header>

<div id="chat-screen">
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-glyph">⚡</div>
      <h2>What can I help with?</h2>
      <p>Powered by Llama 3 on Groq's lightning-fast inference engine.</p>
      <div class="chips">
        <div class="chip" onclick="sendSuggestion('Explain what RAG (Retrieval Augmented Generation) is in simple terms')">What is RAG?</div>
        <div class="chip" onclick="sendSuggestion('Write a Python function to read a CSV with pandas and show first 5 rows')">Python + pandas</div>
        <div class="chip" onclick="sendSuggestion('What is prompt engineering and how do I get better at it?')">Prompt engineering</div>
        <div class="chip" onclick="sendSuggestion('Explain machine learning to me like I am a complete beginner')">Explain ML</div>
        <div class="chip" onclick="sendSuggestion('What are the most useful Python libraries for data science?')">Data science libs</div>
        <div class="chip" onclick="sendSuggestion('Give me 3 AI/ML project ideas to add to my student portfolio')">Portfolio ideas</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <div class="input-box">
        <textarea id="user-input" placeholder="Message Groq AI…" rows="1"></textarea>
        <div class="input-btns">
          <button class="btn-clear" onclick="resetChat()" title="Clear chat">🗑</button>
          <button class="btn-send" id="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
  const API_KEY = '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';
  const MODEL   = 'llama-3.1-8b-instant';
  let history   = [];

  window.addEventListener('load', () => {
    document.getElementById('chat-screen').style.display = 'flex';
    document.getElementById('user-input').focus();
  });

  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  const WELCOME_HTML = () => `
    <div class="welcome" id="welcome">
      <div class="welcome-glyph">⚡</div>
      <h2>What can I help with?</h2>
      <p>Powered by Llama 3 on Groq's lightning-fast inference engine.</p>
      <div class="chips">
        <div class="chip" onclick="sendSuggestion('Explain what RAG (Retrieval Augmented Generation) is in simple terms')">What is RAG?</div>
        <div class="chip" onclick="sendSuggestion('Write a Python function to read a CSV with pandas and show first 5 rows')">Python + pandas</div>
        <div class="chip" onclick="sendSuggestion('What is prompt engineering and how do I get better at it?')">Prompt engineering</div>
        <div class="chip" onclick="sendSuggestion('Explain machine learning to me like I am a complete beginner')">Explain ML</div>
        <div class="chip" onclick="sendSuggestion('What are the most useful Python libraries for data science?')">Data science libs</div>
        <div class="chip" onclick="sendSuggestion('Give me 3 AI/ML project ideas to add to my student portfolio')">Portfolio ideas</div>
      </div>
    </div>`;

  function resetChat() {
    history = [];
    document.getElementById('messages').innerHTML = WELCOME_HTML();
  }

  function sendSuggestion(text) {
    ta.value = text;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
    sendMessage();
  }

  function addMsg(role, html) {
    const w = document.getElementById('welcome');
    if (w) w.remove();
    const wrap = document.getElementById('messages');
    const row  = document.createElement('div');
    row.className = `msg-row ${role}`;
    const av  = document.createElement('div');
    av.className = 'av';
    av.textContent = role === 'user' ? '👤' : '⚡';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;
    row.appendChild(av);
    row.appendChild(bub);
    wrap.appendChild(row);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function fmt(t) {
    t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) =>
      `<pre><code>${esc(c.trim())}</code></pre>`);
    t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\n/g, '<br>');
    return t;
  }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showTyping() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
    const wrap = document.getElementById('messages');
    const row  = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    row.innerHTML = `<div class="av">⚡</div>
      <div class="bubble"><div class="typing-dots">
        <span></span><span></span><span></span></div></div>`;
    wrap.appendChild(row);
    wrap.scrollTop = wrap.scrollHeight;
  }
  function hideTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  async function sendMessage() {
    const btn  = document.getElementById('send-btn');
    const text = ta.value.trim();
    if (!text || btn.disabled) return;

    ta.value = ''; ta.style.height = 'auto';
    btn.disabled = true;

    addMsg('user', esc(text));
    history.push({ role:'user', content:text });
    showTyping();

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization':`Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: MODEL,
          messages:[
            { role:'system', content:'You are a helpful, concise AI assistant. Format code in markdown code blocks.' },
            ...history
          ],
          temperature: 0.7,
          max_tokens: 1024
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);

      const reply = data.choices[0].message.content;
      history.push({ role:'assistant', content:reply });
      hideTyping();
      addMsg('bot', fmt(reply));

    } catch(err) {
      hideTyping();
      const wrap = document.getElementById('messages');
      const e = document.createElement('div');
      e.style.cssText = 'text-align:center;color:#ff5577;font-size:12px;padding:10px 0';
      e.textContent = `❌ ${err.message}`;
      wrap.appendChild(e);
    }

    btn.disabled = false;
    ta.focus();
  }
</script>
</body>
</html>
